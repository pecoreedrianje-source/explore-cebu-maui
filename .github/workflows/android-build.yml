name: Build Android APK
on: [push]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Install MAUI Workload
        run: dotnet workload install maui

      - name: Restore Dependencies
        # Removed the 'explore-cebu-maui/' prefix
        run: dotnet restore CebuFinalApp/CebuFinalApp.csproj

      - name: Build and Publish APK
        # Removed the prefix here too and kept the support bypass
        run: dotnet publish CebuFinalApp/CebuFinalApp.csproj -f net8.0-android -c Release /p:CheckEolWorkloads=false

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ExploreCebu-Android-Build
          path: CebuFinalApp/bin/Release/net8.0-android/*-Signed.apk